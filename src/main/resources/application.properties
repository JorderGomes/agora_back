spring.application.name=agora

spring.config.import=optional:file:.env[.properties]

# --- H2 Config ---
spring.datasource.url=jdbc:h2:file:${DATABASE_URL};DB_CLOSE_ON_EXIT=FALSE;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 web console to view
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Email server configuration
spring.mail.host=${EMAIL_HOST}
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_HOST_USERNAME}
spring.mail.password=${EMAIL_HOST_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

api.security.token.secret=${JWT_SECRET:${JWT_SECRET}}
api.security.token.expiration=${JWT_EXPIRATION:${JWT_EXPIRATION}}